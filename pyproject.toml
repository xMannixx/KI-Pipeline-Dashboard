[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["data", "**/*(# Edit conflict*).py", "**/*(# Edit conflict*).toml"]

[tool.ruff.lint]
select = ["E", "F", "W"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
files = ["app.py", "pipeline"]
ignore_missing_imports = true
warn_unused_ignores = true
check_untyped_defs = true
no_implicit_optional = true
follow_imports = "skip"
